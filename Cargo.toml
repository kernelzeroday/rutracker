[package]
name = "rutracker"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
dirs = "6"
encoding_rs = "0.8"
percent-encoding = "2"
reqwest = { version = "0.12", features = ["blocking", "cookies"] }
scraper = "0.22"
serde = { version = "1", features = ["derive"] }
toml = "0.8"
